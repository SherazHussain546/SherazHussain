[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Omit known-public identifiers from the Netlify secrets scanner to prevent false positives.
  # These keys are required for the Firebase Client SDK and are intended to be public.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"

[[plugins]]
  package = "@netlify/plugin-nextjs"
